<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéLearn TCG | Price Checker</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-logo">PokéLearn TCG</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="guides.html">Beginner Guides</a></li>
        <li><a href="prices.html" class="active">Price Checker</a></li>
        <li><a href="detection.html">Card Detection</a></li>
        <li><a href="scams.html">Scam Alerts</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>

    </nav>
  </header>

  <main>
    <section class="search-container" style="background: transparent; padding: 20px;">
      <div class="search-wrapper" style="display: flex; max-width: 800px; margin: 0 auto; gap: 10px; position: relative;">
        <input type="text" id="card-search" class="search-input" placeholder="Search card name..." autocomplete="off" style="flex: 1; background: #e0e0e0; color: #333; border-radius: 20px;">
        <button class="btn btn-secondary" style="border-radius: 20px; padding: 10px 30px;">Search</button>
        <ul id="search-results" class="search-results" style="position: absolute; top: 100%; left: 0; right: 100px; z-index: 10;">
          <!-- JS dynamically populates this -->
        </ul>
      </div>
    </section>

    <section class="card-details-section" id="card-details-section" style="display: none; max-width: 1000px; margin: 20px auto; padding: 0 20px;">
      
      <!-- Top Half: Card Info -->
      <div class="card-info-grid">
        <div class="card-image-col">
          <img id="selected-card-img" src="C:\Users\ASUS\.gemini\antigravity\brain\821c2cc8-7bc3-403f-a4cd-717827d33530\real_card_1782743591871.png" alt="Card Image">
        </div>
        <div class="card-data-col">
          <h2 id="selected-card-title" class="card-title-lg">Card Name Placeholder</h2>
          <div class="card-badges">
            <span class="badge" id="selected-card-set">Set Name</span>
            <span class="badge">Holo Rare</span>
          </div>
          
          <div class="price-stats-grid">
            <div class="stat-box">
              <span class="stat-label">Market</span>
              <span class="stat-value" id="stat-market">$0.00</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Low</span>
              <span class="stat-value" id="stat-low">$0.00</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">High</span>
              <span class="stat-value" id="stat-high">$0.00</span>
            </div>
          </div>
        </div>
      </div>

      <hr style="border: none; border-top: 1px solid #ccc; margin: 30px 0;">

      <!-- Bottom Half: Chart -->
      <div class="chart-wrapper">
        <div class="chart-header">
          <h3 class="chart-title-placeholder" style="width: 200px; height: 30px; background: #d0d0d0; border-radius: 15px; color: transparent;">Price History</h3>
          <div class="chart-tabs">
            <button class="tab-btn" data-range="1W">1W</button>
            <button class="tab-btn active" data-range="1M">1M</button>
            <button class="tab-btn" data-range="3M">3M</button>
            <button class="tab-btn" data-range="1Y">1Y</button>
          </div>
        </div>
        <div class="chart-canvas-container" style="background: #e0e0e0; padding: 20px; border-radius: 10px;">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

    </section>
  </main>

  <footer>
    <div class="container footer-content">
      <div>
        <h3>PokéLearn TCG</h3>
        <p>Empowering trainers worldwide.</p>
      </div>
      <div>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
